services:
  - type: web
    name: user-engagement-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DATABASE_PATH
        value: /var/data/database.db
      - key: COOKIE_SECURE
        value: true
    disks:
      - name: sqlite-data
        mountPath: /var/data
        sizeGB: 1
