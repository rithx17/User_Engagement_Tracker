version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: engagement-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: engagement-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/engagement_tracker
      JWT_SECRET: replace_with_strong_secret
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:8080
      COOKIE_SECURE: "false"
      AUTO_DEMO_SEED: "false"
    ports:
      - '5000:5000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/api/health']
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: engagement-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '8080:80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/health']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
